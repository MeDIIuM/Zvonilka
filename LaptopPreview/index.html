<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Звонилка - Laptop Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="search-wrap">
      <input id="searchInput" type="search" placeholder="Поиск по имени или номеру" autocomplete="off" />
      <button id="openSettings" class="icon-btn" type="button" aria-label="Открыть настройки">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 8.9a3.1 3.1 0 1 0 0 6.2 3.1 3.1 0 0 0 0-6.2Zm9.1 2.4-1.8-.3a7.4 7.4 0 0 0-.7-1.6l1-1.5a1 1 0 0 0-.1-1.2l-1.8-1.8a1 1 0 0 0-1.2-.1l-1.5 1a7.4 7.4 0 0 0-1.6-.7l-.3-1.8a1 1 0 0 0-1-.8h-2.5a1 1 0 0 0-1 .8l-.3 1.8a7.4 7.4 0 0 0-1.6.7l-1.5-1a1 1 0 0 0-1.2.1L4.5 6.7a1 1 0 0 0-.1 1.2l1 1.5c-.3.5-.5 1-.7 1.6l-1.8.3a1 1 0 0 0-.8 1v2.5a1 1 0 0 0 .8 1l1.8.3c.2.6.4 1.1.7 1.6l-1 1.5a1 1 0 0 0 .1 1.2l1.8 1.8a1 1 0 0 0 1.2.1l1.5-1c.5.3 1 .5 1.6.7l.3 1.8a1 1 0 0 0 1 .8h2.5a1 1 0 0 0 1-.8l.3-1.8c.6-.2 1.1-.4 1.6-.7l1.5 1a1 1 0 0 0 1.2-.1l1.8-1.8a1 1 0 0 0 .1-1.2l-1-1.5c.3-.5.5-1 .7-1.6l1.8-.3a1 1 0 0 0 .8-1v-2.5a1 1 0 0 0-.8-1Z"/>
        </svg>
      </button>
    </section>

    <section>
      <ul id="contactsList" class="contacts-list"></ul>
    </section>

    <footer class="hint">
      На ноутбуке фактический звонок может не стартовать. Для MVP важно событие нажатия: оно увеличивает счетчик и меняет сортировку.
    </footer>
  </main>

  <section id="settingsModal" class="settings-modal" aria-hidden="true">
    <div class="settings-backdrop" data-close="true"></div>
    <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <h2 id="settingsTitle">Настройки</h2>
        <button id="closeSettings" class="icon-btn" type="button" aria-label="Закрыть настройки">x</button>
      </div>

      <div class="settings-group">
        <p class="settings-label">Тема</p>
        <label class="radio-option">
          <input type="radio" name="theme" value="light" />
          <span>Светлая</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="theme" value="dark" />
          <span>Темная</span>
        </label>
      </div>

      <div class="settings-group">
        <button id="resetStatsInSettings" class="danger-btn" type="button">Сбросить счетчики</button>
      </div>
    </div>
  </section>

  <section id="editModal" class="settings-modal" aria-hidden="true">
    <div class="settings-backdrop" data-close-edit="true"></div>
    <div class="settings-panel edit-panel" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <div class="settings-header">
        <h2 id="editTitle">Редактирование контакта</h2>
        <button id="closeEdit" class="icon-btn" type="button" aria-label="Закрыть редактирование">x</button>
      </div>

      <form id="editForm" class="edit-form">
        <label class="field">
          <span>Имя</span>
          <input id="editFirstName" type="text" maxlength="40" required />
        </label>
        <label class="field">
          <span>Фамилия</span>
          <input id="editLastName" type="text" maxlength="40" />
        </label>
        <label class="field">
          <span>Номер</span>
          <input id="editPhone" type="tel" maxlength="30" required />
        </label>

        <div class="photo-group">
          <p class="settings-label">Фото</p>
          <div class="edit-photo-row">
            <img id="editPhotoPreview" class="edit-photo" alt="Фото контакта" />
            <div class="photo-actions">
              <label class="upload-btn" for="editPhotoInput">Поставить фото</label>
              <input id="editPhotoInput" type="file" accept="image/*" />
              <button id="removePhotoBtn" class="danger-btn subtle" type="button">Удалить фото</button>
            </div>
          </div>
        </div>

        <button class="call-btn" type="submit">Сохранить</button>
      </form>
    </div>
  </section>

  <template id="contactRowTemplate">
    <li class="contact-row">
      <div class="avatar" aria-hidden="true"></div>
      <div class="contact-main">
        <p class="name"></p>
        <p class="meta"></p>
      </div>
    </li>
  </template>

  <script src="./app.js"></script>
</body>
</html>
